<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Futsal Kramat Dalam - Portofolio Mohd Daniel Fendisa</title>
    <!-- Framework & Library (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; scroll-behavior: smooth; }
        .slider-transition { transition: all 700ms cubic-bezier(0.4, 0, 0.2, 1); }
        .glass-nav { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(8px); }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { MapPin, Play, Users, ShieldCheck, Star, ChevronLeft, ChevronRight, GraduationCap, Video, Camera, Heart, ExternalLink } = lucide;

        const App = () => {
            const [currentSlide, setCurrentSlide] = React.useState(0);
            const mapLink = "https://maps.app.goo.gl/sGcyXThMZySs2uiU7?g_st=ac";
            
            // ==========================================
            // KONFIGURASI MEDIA (GANTI DI SINI)
            // ==========================================
            const videoSource = "./video-lapangan.mp4"; 
            const landscapePhotos = ["./foto1.jpeg", "./foto2.jpeg"];
            const iconicImage = "./foto1.jpeg"; 
            const profileImage = "./profil_danil.jpg"; // Nama file foto profil Daniel
            // ==========================================

            const nextSlide = () => setCurrentSlide((prev) => (prev === landscapePhotos.length - 1 ? 0 : prev + 1));
            const prevSlide = () => setCurrentSlide((prev) => (prev === 0 ? landscapePhotos.length - 1 : prev - 1));

            React.useEffect(() => {
                const timer = setInterval(nextSlide, 5000);
                lucide.createIcons();
                return () => clearInterval(timer);
            }, [currentSlide]);

            return (
                <div className="min-h-screen flex flex-col">
                    {/* Identity Header */}
                    <nav className="glass-nav text-white/80 py-3 sticky top-0 z-[100] border-b border-white/10 shadow-lg">
                        <div className="container mx-auto px-6 flex justify-between items-center text-[10px] md:text-xs font-bold tracking-widest uppercase">
                            <div className="flex items-center gap-2">
                                <i data-lucide="graduation-cap" className="w-4 h-4 text-emerald-400"></i>
                                <span>Digital Gampong Kramat Dalam</span>
                            </div>
                            <div className="text-right">
                                <span className="text-emerald-400">Mohd Daniel Fendisa</span> • 23105111054
                            </div>
                        </div>
                    </nav>

                    {/* Hero Section */}
                    <header className="bg-white pt-16 pb-24 overflow-hidden">
                        <div className="container mx-auto px-6 grid lg:grid-cols-2 gap-16 items-center">
                            <div className="text-center lg:text-left order-2 lg:order-1">
                                <span className="inline-flex items-center gap-2 px-3 py-1 bg-emerald-50 text-emerald-700 rounded-lg text-[10px] font-black uppercase tracking-widest mb-6 border border-emerald-100">
                                    Fasilitas Olahraga Sigli
                                </span>
                                <h1 className="text-5xl md:text-7xl font-extrabold text-slate-900 leading-[1.1] mb-8">
                                    Lapangan <span className="text-emerald-600">Kebanggaan</span> Gampong Kita.
                                </h1>
                                <p className="text-slate-500 text-lg mb-10 max-w-xl leading-relaxed mx-auto lg:mx-0">
                                    Mewujudkan masyarakat yang sehat melalui fasilitas olahraga yang representatif di Gampong Kramat Dalam, Kota Sigli.
                                </p>
                                <div className="flex flex-wrap justify-center lg:justify-start gap-4">
                                    <a href="#media" className="bg-emerald-600 text-white px-8 py-4 rounded-2xl font-bold flex items-center gap-2 hover:bg-emerald-700 transition-all shadow-xl shadow-emerald-100">
                                        Lihat Dokumentasi <i data-lucide="play" className="w-4 h-4 fill-current"></i>
                                    </a>
                                    <a href={mapLink} target="_blank" className="bg-slate-100 text-slate-700 px-8 py-4 rounded-2xl font-bold flex items-center gap-2 hover:bg-slate-200 transition-all">
                                        Petunjuk Jalan <i data-lucide="external-link" className="w-4 h-4"></i>
                                    </a>
                                </div>
                            </div>
                            
                            <div className="order-1 lg:order-2 relative group">
                                <div className="absolute -inset-4 bg-emerald-100 rounded-[3rem] rotate-2 group-hover:rotate-0 transition-transform duration-700"></div>
                                <div className="relative h-[350px] md:h-[500px] rounded-[2.5rem] overflow-hidden shadow-2xl border-4 border-white">
                                    <img src={iconicImage} className="w-full h-full object-cover" alt="Kramat Dalam" />
                                    <div className="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent"></div>
                                    <div className="absolute bottom-8 left-8 text-white">
                                        <p className="text-xs font-bold uppercase tracking-[0.2em] mb-1 opacity-80 text-emerald-400">Ikon Gampong</p>
                                        <h3 className="text-2xl font-black italic">Area Kramat Dalam</h3>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </header>

                    {/* Media Showcase */}
                    <section id="media" className="py-24 bg-slate-900 text-white">
                        <div className="container mx-auto px-6">
                            <div className="max-w-2xl mx-auto text-center mb-16">
                                <h2 className="text-3xl md:text-5xl font-black mb-4 tracking-tight uppercase italic">Visual Arena</h2>
                                <p className="text-slate-400 tracking-wide">Dokumentasi sarana prasarana yang tersedia.</p>
                            </div>

                            <div className="grid lg:grid-cols-2 gap-10 items-start">
                                {/* Video Area */}
                                <div className="space-y-6">
                                    <div className="flex items-center gap-3">
                                        <div className="w-10 h-10 bg-emerald-500/20 rounded-xl flex items-center justify-center text-emerald-400">
                                            <i data-lucide="video" className="w-5 h-5"></i>
                                        </div>
                                        <h4 className="text-xl font-bold italic tracking-tight">Dokumentasi Video</h4>
                                    </div>
                                    <div className="relative rounded-[2.5rem] overflow-hidden border-2 border-white/10 aspect-video shadow-2xl bg-black">
                                        <video controls className="w-full h-full object-cover opacity-80 hover:opacity-100 transition-opacity">
                                            <source src={videoSource} type="video/mp4" />
                                        </video>
                                    </div>
                                </div>

                                {/* Photo Slider Area */}
                                <div className="space-y-6">
                                    <div className="flex justify-between items-center">
                                        <div className="flex items-center gap-3">
                                            <div className="w-10 h-10 bg-emerald-500/20 rounded-xl flex items-center justify-center text-emerald-400">
                                                <i data-lucide="camera" className="w-5 h-5"></i>
                                            </div>
                                            <h4 className="text-xl font-bold italic tracking-tight">Galeri Foto</h4>
                                        </div>
                                        <div className="flex gap-2">
                                            <button onClick={prevSlide} className="p-3 bg-white/5 hover:bg-emerald-600 rounded-xl transition-all border border-white/10 group">
                                                <i data-lucide="chevron-left" className="w-4 h-4 group-hover:scale-125 transition-transform"></i>
                                            </button>
                                            <button onClick={nextSlide} className="p-3 bg-white/5 hover:bg-emerald-600 rounded-xl transition-all border border-white/10 group">
                                                <i data-lucide="chevron-right" className="w-4 h-4 group-hover:scale-125 transition-transform"></i>
                                            </button>
                                        </div>
                                    </div>
                                    <div className="relative aspect-video rounded-[2.5rem] overflow-hidden border-2 border-white/10 shadow-2xl group bg-slate-800">
                                        {landscapePhotos.map((img, idx) => (
                                            <img 
                                                key={idx} 
                                                src={img} 
                                                className={`absolute inset-0 w-full h-full object-cover slider-transition ${idx === currentSlide ? 'opacity-100 scale-100' : 'opacity-0 scale-110'}`} 
                                                onError={(e) => e.target.src = "https://images.unsplash.com/photo-1574629810360-7efbbe195018?q=80&w=1200"}
                                            />
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* Facility Info */}
                    <section className="py-24 bg-white">
                        <div className="container mx-auto px-6 grid md:grid-cols-3 gap-8">
                            {[
                                { icon: "shield-check", title: "Keamanan Utama", desc: "Berlokasi di pemukiman warga yang aman dan kondusif." },
                                { icon: "users", title: "Fasilitas Publik", desc: "Milik masyarakat Gampong dan terbuka untuk umum." },
                                { icon: "star", title: "Terawat Baik", desc: "Pemeliharaan rutin dilakukan demi kenyamanan bermain." }
                            ].map((item, idx) => (
                                <div key={idx} className="p-10 bg-slate-50 rounded-[3rem] border border-slate-100 hover:bg-white hover:shadow-2xl hover:shadow-emerald-100 transition-all duration-500 group">
                                    <div className="w-14 h-14 bg-emerald-600 text-white rounded-2xl flex items-center justify-center mb-8 shadow-lg shadow-emerald-100 group-hover:scale-110 transition-transform">
                                        <i data-lucide={item.icon}></i>
                                    </div>
                                    <h4 className="text-2xl font-black mb-4 text-slate-800 tracking-tight uppercase italic">{item.title}</h4>
                                    <p className="text-slate-500 leading-relaxed italic">"{item.desc}"</p>
                                </div>
                            ))}
                        </div>
                    </section>

                    {/* Developer Profile Footer (Dengan Foto Profil) */}
                    <footer className="bg-slate-50 border-t border-slate-200 py-24 mt-auto">
                        <div className="container mx-auto px-6 text-center">
                            <div className="inline-flex flex-col items-center bg-white p-10 md:p-14 rounded-[3.5rem] border border-slate-200 shadow-sm relative">
                                <div className="absolute -top-6 bg-emerald-600 text-white px-6 py-2 rounded-full text-[10px] font-black uppercase tracking-widest shadow-xl shadow-emerald-200">
                                    Author & Developer
                                </div>
                                
                                {/* Foto Profil Daniel 1x1 */}
                                <div className="w-32 h-32 mb-8 relative group">
                                    <div className="absolute -inset-2 bg-emerald-500/20 rounded-[2.5rem] rotate-6 group-hover:rotate-0 transition-transform duration-500"></div>
                                    <div className="relative w-full h-full bg-slate-100 rounded-[2.2rem] overflow-hidden border-4 border-white shadow-lg">
                                        <img 
                                            src={profileImage} 
                                            className="w-full h-full object-cover" 
                                            alt="Profil Daniel Fendisa"
                                            onError={(e) => e.target.src = "https://images.unsplash.com/photo-1633332755192-727a05c4013d?q=80&w=400"} 
                                        />
                                    </div>
                                </div>

                                <h5 className="text-3xl font-black text-slate-900 mb-1 tracking-tight">Mohd Daniel Fendisa</h5>
                                <p className="text-emerald-600 font-extrabold mb-6 tracking-[0.2em] uppercase text-xs">NPM: 23105111054</p>
                                <div className="h-1 w-16 bg-slate-100 rounded-full mb-8"></div>
                                <p className="text-slate-400 text-sm italic font-medium">Mahasiswa Teknik Informatika <br/> Sigli, Pidie, Aceh</p>
                            </div>
                            <div className="mt-16 flex items-center justify-center gap-2 text-slate-300 font-black text-[10px] uppercase tracking-[0.3em]">
                                <span>PROYEK</span> <i data-lucide="heart" className="w-3 h-3 fill-slate-300"></i> <span>GAMPONG</span>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

```
