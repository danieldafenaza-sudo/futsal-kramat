
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arena Serbaguna Kramat Dalam - Mohd Daniel Fendisa</title>
    <!-- Framework & Library -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; scroll-behavior: smooth; }
        .glass-nav { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(8px); }
        .slider-transition { transition: all 700ms cubic-bezier(0.4, 0, 0.2, 1); }
        .price-card:hover { transform: translateY(-10px); }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        // --- Komponen Ikon SVG Inline ---
        const MapPin = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>
        );
        const MessageCircle = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
        );
        const Check = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="20 6 9 17 4 12"/></svg>
        );
        const Calendar = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>
        );

        const App = () => {
            const [currentSlide, setCurrentSlide] = React.useState(0);
            const mapLink = "https://maps.app.goo.gl/sGcyXThMZySs2uiU7?g_st=ac";
            
            // --- PEMBARUAN NOMOR WHATSAPP ---
            const waNumber = "62895326376645"; 
            
            const landscapePhotos = ["./foto1.jpeg", "./foto2.jpeg"];
            const profilePic = "./profil_danil.jpg"; 

            const openWA = (service) => {
                const msg = `Halo Pengelola Arena Kramat Dalam, saya ingin menanyakan ketersediaan jadwal untuk sewa ${service}. Mohon informasinya.`;
                window.open(`https://wa.me/${waNumber}?text=${encodeURIComponent(msg)}`, '_blank');
            };

            React.useEffect(() => {
                const timer = setInterval(() => {
                    setCurrentSlide(prev => (prev === landscapePhotos.length - 1 ? 0 : prev + 1));
                }, 5000);
                return () => clearInterval(timer);
            }, []);

            return (
                <div className="min-h-screen flex flex-col">
                    {/* Header */}
                    <nav className="glass-nav py-4 sticky top-0 z-[100] border-b border-white/10 shadow-lg text-white">
                        <div className="container mx-auto px-6 flex justify-between items-center">
                            <div className="flex items-center gap-3">
                                <div className="bg-emerald-500 p-2 rounded-xl">
                                    <Calendar className="w-5 h-5 text-white" />
                                </div>
                                <span className="font-black text-xl tracking-tighter uppercase">Kramat<span className="text-emerald-500">Arena</span></span>
                            </div>
                            <a href="#sewa" className="bg-emerald-500 hover:bg-emerald-600 px-5 py-2 rounded-full text-xs font-bold transition-all">Sewa Sekarang</a>
                        </div>
                    </nav>

                    {/* Hero */}
                    <header className="bg-white pt-20 pb-28">
                        <div className="container mx-auto px-6 grid lg:grid-cols-2 gap-16 items-center">
                            <div className="order-2 lg:order-1 text-center lg:text-left">
                                <span className="inline-block px-4 py-1.5 bg-emerald-50 text-emerald-700 rounded-lg text-xs font-black uppercase tracking-widest mb-6">Layanan Serbaguna Gampong</span>
                                <h1 className="text-5xl md:text-7xl font-extrabold text-slate-900 leading-[1.1] mb-8">
                                    Satu Tempat <br/> Beragam <span className="text-emerald-600 italic">Acara.</span>
                                </h1>
                                <p className="text-slate-500 text-lg md:text-xl leading-relaxed mb-12 max-w-xl mx-auto lg:mx-0">
                                    Bukan sekadar lapangan futsal. Arena Kramat Dalam melayani sewa harian untuk pesta pernikahan, hajatan, hingga kompetisi olahraga.
                                </p>
                                <div className="flex flex-wrap justify-center lg:justify-start gap-4">
                                    <a href="#sewa" className="bg-slate-900 text-white px-10 py-5 rounded-2xl font-bold hover:bg-slate-800 transition-all shadow-xl text-center">Lihat Harga</a>
                                    <button onClick={() => openWA('Layanan Serbaguna')} className="bg-white border-2 border-slate-100 text-slate-600 px-10 py-5 rounded-2xl font-bold flex items-center justify-center gap-3 hover:bg-slate-50 transition-all">
                                        WhatsApp <MessageCircle className="w-5 h-5 text-emerald-500" />
                                    </button>
                                </div>
                            </div>
                            <div className="order-1 lg:order-2 relative group">
                                <div className="absolute -inset-4 bg-emerald-100 rounded-[4rem] rotate-3 opacity-40 animate-pulse"></div>
                                <div className="relative rounded-[3.5rem] overflow-hidden shadow-2xl border-8 border-white aspect-[4/3]">
                                    <img src={landscapePhotos[currentSlide]} className="w-full h-full object-cover transition-opacity duration-1000" alt="Arena" />
                                    <div className="absolute inset-0 bg-gradient-to-t from-slate-900/60 to-transparent"></div>
                                    <div className="absolute bottom-10 left-10 text-white text-left">
                                        <p className="text-xs font-bold uppercase tracking-[0.3em] mb-2 text-emerald-400 font-black tracking-tighter">Serbaguna & Luas</p>
                                        <h3 className="text-3xl font-black italic uppercase">Kramat Dalam, Sigli</h3>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </header>

                    {/* Harga Section */}
                    <section id="sewa" className="py-32 bg-slate-900 text-white">
                        <div className="container mx-auto px-6">
                            <div className="text-center mb-20">
                                <h2 className="text-4xl md:text-5xl font-black mb-6 uppercase tracking-tight italic">Daftar Harga Sewa</h2>
                                <p className="text-slate-400 max-w-2xl mx-auto italic">Pilih layanan sesuai kebutuhan Anda. Transparan dan terjangkau.</p>
                            </div>

                            <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-8">
                                {/* Futsal */}
                                <div className="price-card p-10 bg-white/5 border border-white/10 rounded-[3rem] transition-all duration-500 flex flex-col h-full">
                                    <h4 className="text-2xl font-black mb-2 uppercase tracking-tighter italic text-left">Olahraga Futsal</h4>
                                    <p className="text-emerald-400 text-sm font-bold mb-8 text-left">Bebas Main / Sesi</p>
                                    <div className="text-4xl font-black mb-8 italic tracking-tighter text-left">Rp 200.000 <span className="text-sm font-normal text-slate-500 tracking-normal">/ Sesi</span></div>
                                    <ul className="space-y-4 mb-10 flex-1">
                                        <li className="flex items-center gap-3 text-slate-300 text-sm"><Check className="text-emerald-500 w-4 h-4 shrink-0"/> Lampu Penerangan Malam</li>
                                        <li className="flex items-center gap-3 text-slate-300 text-sm"><Check className="text-emerald-500 w-4 h-4 shrink-0"/> Area Parkir Luas</li>
                                        <li className="flex items-center gap-3 text-slate-300 text-sm"><Check className="text-emerald-500 w-4 h-4 shrink-0"/> Air Bersih & Toilet</li>
                                    </ul>
                                    <button onClick={() => openWA('Futsal')} className="w-full py-4 bg-emerald-500 text-white rounded-2xl font-black hover:bg-emerald-600 transition-all uppercase tracking-widest text-xs">Pesan Jadwal</button>
                                </div>

                                {/* Pesta Nikah / Acara */}
                                <div className="price-card p-10 bg-emerald-600 rounded-[3rem] transition-all duration-500 flex flex-col h-full shadow-2xl shadow-emerald-500/20 scale-105 border-4 border-emerald-400">
                                    <div className="bg-yellow-400 text-black px-4 py-1 rounded-full text-[10px] font-black uppercase tracking-widest w-fit mb-6">Paling Populer</div>
                                    <h4 className="text-2xl font-black mb-2 uppercase tracking-tighter italic text-left">Pesta Nikah / Acara</h4>
                                    <p className="text-emerald-100 text-sm font-bold mb-8 text-left">Sewa Satu Hari Penuh</p>
                                    <div className="text-4xl font-black mb-8 italic tracking-tighter text-left">Rp 800.000 <span className="text-sm font-normal text-emerald-200 tracking-normal">/ Hari</span></div>
                                    <ul className="space-y-4 mb-10 flex-1">
                                        <li className="flex items-center gap-3 text-emerald-50 text-sm"><Check className="text-white w-4 h-4 shrink-0"/> Kapasitas Tamu Melimpah</li>
                                        <li className="flex items-center gap-3 text-emerald-50 text-sm"><Check className="text-white w-4 h-4 shrink-0"/> Lokasi Strategis di Sigli</li>
                                        <li className="flex items-center gap-3 text-emerald-50 text-sm"><Check className="text-white w-4 h-4 shrink-0"/> Listrik & Air Ready</li>
                                    </ul>
                                    <button onClick={() => openWA('Acara Pesta')} className="w-full py-4 bg-white text-emerald-600 rounded-2xl font-black hover:bg-slate-100 transition-all uppercase tracking-widest text-xs">Cek Tanggal Kosong</button>
                                </div>

                                {/* Khusus Warga */}
                                <div className="price-card p-10 bg-white/5 border border-white/10 rounded-[3rem] transition-all duration-500 flex flex-col h-full border-dashed">
                                    <h4 className="text-2xl font-black mb-2 uppercase tracking-tighter italic text-left">Khusus Warga</h4>
                                    <p className="text-slate-500 text-sm font-bold mb-8 text-left">Kramat Dalam Asli</p>
                                    <div className="text-4xl font-black mb-8 italic tracking-tighter text-emerald-400 uppercase text-left">Gratis</div>
                                    <ul className="space-y-4 mb-10 flex-1 italic text-slate-500 text-left">
                                        <li className="flex items-center gap-3 text-sm font-medium"><Check className="text-emerald-500 w-4 h-4 shrink-0"/> Khusus Kepentingan Gampong</li>
                                        <li className="flex items-center gap-3 text-sm font-medium"><Check className="text-emerald-500 w-4 h-4 shrink-0"/> Koordinasi Keuchik/Pengelola</li>
                                        <li className="flex items-center gap-3 text-sm font-medium"><Check className="text-emerald-500 w-4 h-4 shrink-0"/> Menjaga Kebersihan</li>
                                    </ul>
                                    <div className="w-full py-4 border border-white/20 text-white/50 rounded-2xl text-center text-[10px] font-black uppercase tracking-widest">Syarat & Ketentuan Berlaku</div>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* Footer / Profile */}
                    <footer id="profile" className="bg-slate-50 border-t border-slate-200 py-24 text-center">
                        <div className="container mx-auto px-6 text-center">
                            <div className="inline-flex flex-col items-center bg-white p-10 rounded-[3.5rem] border border-slate-200 shadow-sm relative">
                                <div className="absolute -top-6 bg-emerald-600 text-white px-6 py-2 rounded-full text-[10px] font-black uppercase tracking-widest shadow-xl">
                                    Pengelola & Developer
                                </div>
                                <div className="w-32 h-32 mb-8 relative group">
                                    <div className="absolute -inset-2 bg-emerald-500/20 rounded-[2.5rem] rotate-6 group-hover:rotate-0 transition-all duration-500"></div>
                                    <div className="relative w-full h-full bg-slate-100 rounded-[2.2rem] overflow-hidden border-4 border-white shadow-lg">
                                        <img src={profilePic} className="w-full h-full object-cover" alt="Danil" onError={(e) => e.target.src = "https://images.unsplash.com/photo-1633332755192-727a05c4013d?q=80&w=400"} />
                                    </div>
                                </div>
                                <h5 className="text-2xl font-black text-slate-900 mb-1">Mohd Daniel Fendisa</h5>
                                <p className="text-emerald-600 font-extrabold mb-8 tracking-[0.2em] uppercase text-[10px]">NPM: 23105111054</p>
                                <div className="flex items-center justify-center gap-6">
                                    <a href={mapLink} target="_blank" className="text-slate-400 hover:text-emerald-600 transition-colors"><MapPin className="w-5 h-5"/></a>
                                    <button onClick={() => openWA('Pertanyaan Umum')} className="text-slate-400 hover:text-emerald-600 transition-colors"><MessageCircle className="w-5 h-5"/></button>
                                </div>
                            </div>
                            <div className="mt-16 flex items-center justify-center gap-2 text-slate-300 font-black text-[10px] uppercase tracking-[0.3em]">
                                <span>PROYEK</span> <span className="w-1.5 h-1.5 bg-emerald-400 rounded-full"></span> <span>GAMPONG</span>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

```
